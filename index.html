<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockView Premium | 专业股票分析平台</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lightweight Charts (Loaded Locally for max speed and reliability) -->
    <script src="node_modules/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <span>StockView</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    概览
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                    市场趋势
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    投资组合
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    市场新闻
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">U</div>
                    <div class="user-info">
                        <span class="user-name">GUEST_USER</span>
                        <span class="user-status">高级会员</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-container">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" placeholder="输入股票代码 (如 AAPL, 0331.KL)..." id="stock-search">
                    <button id="search-btn" class="btn btn-search">搜索</button>
                </div>
                <div class="top-actions">
                    <div class="notification-bell">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        <span class="badge"></span>
                    </div>
                    <button class="btn btn-primary">立即交易</button>
                </div>
            </header>

            <section class="dashboard-grid">
                <!-- Summary Cards -->
                <div class="card summary-card gold-gradient">
                    <div class="card-content">
                        <h3>总资产净值</h3>
                        <div class="value" id="total-balance">¥ 1,248,500.00</div>
                        <div class="change positive">+2.45% (今日)</div>
                    </div>
                </div>
                <div class="card summary-card blue-gradient">
                    <div class="card-content">
                        <h3>今日盈亏</h3>
                        <div class="value" id="daily-pnl">+¥ 30,580.00</div>
                        <div class="change positive">+1.12%</div>
                    </div>
                </div>
                <div class="card summary-card purple-gradient">
                    <div class="card-content">
                        <h3>可用资金</h3>
                        <div class="value" id="buying-power">¥ 450,000.00</div>
                        <div class="change neutral">--</div>
                    </div>
                </div>

                <!-- Main Chart -->
                <div class="card chart-card large">
                    <div class="card-header">
                        <div class="stock-info">
                            <h2 id="current-stock-name">Apple Inc.</h2>
                            <span class="ticker" id="current-stock-ticker">AAPL</span>
                        </div>
                        <div class="chart-controls">
                            <button class="timeframe-btn active">1D</button>
                            <button class="timeframe-btn">1W</button>
                            <button class="timeframe-btn">1M</button>
                            <button class="timeframe-btn">1Y</button>
                            <button class="timeframe-btn">ALL</button>
                        </div>
                    </div>
                    <div id="chart-container" class="chart-viewport"></div>
                </div>

                <!-- Watchlist -->
                <div class="card watchlist-card">
                    <div class="card-header">
                        <h3>自选股</h3>
                        <a href="#" class="see-all">查看全部</a>
                    </div>
                    <div class="watchlist-items" id="watchlist-container">
                        <!-- Items dynamically generated -->
                    </div>
                </div>

                <!-- Market News -->
                <div class="card news-card">
                    <div class="card-header">
                        <h3>最新资讯</h3>
                    </div>
                    <div class="news-list" id="news-container">
                        <!-- News dynamically generated -->
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
